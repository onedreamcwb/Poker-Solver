<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker RFI Trainer | Pro Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="topbar">
        <h1>Poker RFI <span class="accent">Trainer</span></h1>
        <div class="status-badge">Mode: Pre-Flop Drill</div>
    </header>

    <main class="dashboard">
        <section class="panel inputs-panel">
            <h2>Configuração</h2>
            
            <div class="input-group">
                <label for="train-position">Treinar Posição</label>
                <select id="train-position" class="custom-select">
                    <option value="utg">UTG (Early Position)</option>
                    <option value="mp">MP (Middle Position)</option>
                    <option value="co">Cutoff</option>
                    <option value="btn">Button</option>
                    <option value="sb">Small Blind</option>
                </select>
            </div>

            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem;">
                Todas as mãos simulam que a ação rodou em FOLD até você.
            </p>

            <button class="btn-primary" id="btn-start-training" style="margin-top: 2rem;">Iniciar Sessão</button>
            <button class="btn-secondary" id="btn-stop-training" style="display: none; margin-top: 0.5rem;">Parar Sessão</button>
        </section>

        <section class="panel cards-panel">
            <h2>Mesa</h2>
            
            <div class="table-layout">
                <div class="hand-group hero-group">
                    <h3 id="scenario-text" style="color: var(--accent-color); font-size: 1.1rem; margin-bottom: 1.5rem;">
                        Aguardando início...
                    </h3>
                    
                    <div class="card-slots" id="hero-slots">
                        <div class="card-slot empty" id="slot-1"></div>
                        <div class="card-slot empty" id="slot-2"></div>
                    </div>
                </div>

                <div class="action-buttons" id="action-controls" style="display: none; margin-top: 2rem; gap: 1rem; width: 100%; justify-content: center;">
                    <button class="btn-action fold" id="action-fold">FOLD</button>
                    <button class="btn-action call" id="action-call">CALL</button>
                    <button class="btn-action raise" id="action-raise">RAISE</button>
                </div>
            </div>
        </section>

        <section class="panel results-panel">
            <h2>Desempenho</h2>
            
            <div class="result-box">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <div style="text-align: center;">
                        <span class="result-label">Acertos</span>
                        <span class="result-value accent" id="score-correct">0</span>
                    </div>
                    <div style="text-align: center;">
                        <span class="result-label">Erros</span>
                        <span class="result-value danger" id="score-wrong" style="color: var(--danger-color);">0</span>
                    </div>
                </div>
            </div>

            <div class="feedback-box highlight" id="feedback-display" style="margin-top: 1.5rem; min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 1rem;">
                <p id="feedback-text" style="color: var(--text-muted);">Inicie a sessão para receber mãos.</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
